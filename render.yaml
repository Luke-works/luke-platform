# ─────────────────────────────────────────────────────────────────────────────
# Luke platform — bundled non-prod blueprint
#
# One Render Blueprint that deploys luke-core-engine + luke-core-ui together for
# three shared non-prod environments: platform-dev, platform-qa, platform-uat.
#
# Topology
#   • One shared Postgres instance (luke-nonprod-db). Each environment is
#     isolated in its own schema via DB_SCHEMA (platform_dev/qa/uat) — the engine
#     sets currentSchema and creates the schema on first connect.
#   • Each env = an engine (Docker, from luke-core-engine) + a UI (static, from
#     luke-core-ui) + a consumer auth gateway (Docker, from luke-auth-engine).
#     All pulled from their own repos via `repo:`.
#   • Each env also runs an AI agents service (<env>-agents, Python, from
#     luke-agents): the LukeTalks form builder + agent fleet under /agents/<slug>
#     (form agent also at root /chat). It retains every chat turn in its OWN
#     schema (luke_agents_<env>) so the data can be exported to fine-tune the
#     model — separate from the engine/capability schemas.
#   • Branch per env: develop → dev, qa → qa, uat → uat.
#
# Auth tier (luke-auth-engine, the *-auth services)
#   • Fronts luke-consumer-ui: runs the WorkOS login flows (/auth/*) and verifies
#     the issued WorkOS access tokens, then proxies to the env's engine with a
#     signed "act-as-user" token the engine trusts via JWKS.
#   • core-ui still talks to the engine directly over HTTP Basic (unchanged).
#   • Set each *-auth WORKOS_CLIENT_ID + WORKOS_API_KEY in the dashboard (sync:false).
#
# Prerequisites (one-time)
#   1. Connect THIS repo to Render as a Blueprint.
#   2. Grant Render access to every referenced repo under lukeadministrator
#      (luke-core-engine, luke-core-ui, luke-auth-engine, luke-capability-engine,
#      luke-consumer-ui, luke-agents) so the per-service `repo:` works.
#   3. Create the branches `develop`, `qa`, `uat` in every referenced code repo
#      (including luke-agents).
#
# Notes
#   • VITE_API_BASE_URL is baked into the UI at build time and must be the env's
#     engine URL. ALLOWED_ORIGINS on the engine must be the env's UI URL.
#     These use the deterministic https://<service-name>.onrender.com URLs; if
#     Render assigns a suffixed hostname, update both values accordingly.
#   • Camunda admin password is generated per env — retrieve from the Render
#     dashboard (Environment) after first deploy.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: luke-nonprod-db
    plan: basic-256mb
    databaseName: luke_camunda
    user: luke
    region: ohio
    postgresMajorVersion: "16"

# ── Shared internal secret (Forms → Camunda intake) ──────────────────────────
# The cap→core /api/internal/process-start call is authenticated with a shared
# secret. A group with generateValue makes ONE value per env that BOTH the engine
# and the capability service reference, so they always match. (Switch
# generateValue → sync:false if you'd rather set it manually.)
envVarGroups:
  - name: platform-dev-internal
    envVars:
      - key: LUKE_INTERNAL_SHARED_SECRET
        generateValue: true
  - name: platform-qa-internal
    envVars:
      - key: LUKE_INTERNAL_SHARED_SECRET
        generateValue: true

services:
  # ── platform-dev ──────────────────────────────────────────────────────────
  - type: web
    name: platform-dev-engine
    runtime: docker
    repo: https://github.com/lukeadministrator/luke-core-engine
    branch: develop
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DB_SCHEMA
        value: platform_dev
      - key: POSTGRES_HOST
        fromDatabase:
          name: luke-nonprod-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: luke-nonprod-db
          property: port
      - key: POSTGRES_DATABASE
        fromDatabase:
          name: luke-nonprod-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: luke-nonprod-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: luke-nonprod-db
          property: password
      - key: CAMUNDA_ADMIN_USER
        value: admin
      - key: CAMUNDA_ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://platform-dev-ui.onrender.com,https://*.lukeflow.com
      # Trust the consumer auth gateway (luke-auth-engine) for Bearer tokens.
      - key: LUKE_AUTH_GATEWAY_ENABLED
        value: "true"
      - key: LUKE_AUTH_GATEWAY_JWKS_URL
        value: https://platform-dev-auth.onrender.com/.well-known/jwks.json
      # Reach the capability engine (Forms, etc.) via the CapabilitiesProxyController.
      - key: CAPABILITIES_BASE_URL
        value: https://platform-dev-capability.onrender.com
      # Forms → Camunda intake: validate the cap→core /api/internal/process-start call.
      - fromGroup: platform-dev-internal

  # ── platform-dev-auth (consumer gateway) ────────────────────────────────────
  # Runs the WorkOS login flows (/auth/*) for luke-consumer-ui, verifies the
  # issued WorkOS access tokens, and proxies to the engine with a signed
  # act-as-user token. WORKOS_CLIENT_ID/API_KEY are sync:false — set them per
  # service in the dashboard (same WorkOS project reused across envs for now).
  - type: web
    name: platform-dev-auth
    runtime: docker
    repo: https://github.com/lukeadministrator/luke-auth-engine
    branch: develop
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: CORE_ENGINE_URL
        value: https://platform-dev-engine.onrender.com
      - key: CAPABILITIES_BASE_URL
        value: https://platform-dev-capability.onrender.com
      - key: WORKOS_CLIENT_ID
        sync: false
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_REDIRECT_URI
        value: https://authdev.lukeflow.com/auth/callback
      - key: WORKOS_UI_CALLBACK_URL
        value: https://consdev.lukeflow.com/sso-callback
      - key: WORKOS_COOKIE_SECURE
        value: "true"
      # auth + UI share lukeflow.com (same-site) → Lax is enough; cross-site would need None.
      - key: WORKOS_COOKIE_SAMESITE
        value: Lax
      - key: ALLOWED_ORIGINS
        value: https://consdev.lukeflow.com,https://*.lukeflow.com
      # GATEWAY_PRIVATE_KEY left unset → ephemeral signing key per boot (non-prod).
      # The engine refetches the JWKS on the new kid after a restart.

  - type: web
    name: platform-dev-ui
    runtime: static
    repo: https://github.com/lukeadministrator/luke-core-ui
    branch: develop
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_BASE_URL
        value: https://platform-dev-engine.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ── platform-dev-consumer-ui (end-user app) ────────────────────────────────
  # Headless WorkOS: the SPA talks only to the auth gateway (/auth/*) — no auth
  # SDK, no provider keys in the browser. VITE_AUTH_API_URL is the gateway base.
  - type: web
    name: platform-dev-consumer-ui
    runtime: static
    repo: https://github.com/lukeadministrator/luke-consumer-ui
    branch: develop
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_AUTH_API_URL
        value: https://authdev.lukeflow.com
      # LukeTalks form-builder agent (root /chat alias on the agents service).
      - key: VITE_FORM_AGENT_URL
        value: https://platform-dev-agents.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ── platform-dev-capability (capabilities + Forms) ──────────────────────────
  # Shares luke-nonprod-db in its OWN schema (capability_dev), separate from the
  # engine's camunda schema. Verifies the gateway act-as token via the auth JWKS.
  - type: web
    name: platform-dev-capability
    runtime: docker
    repo: https://github.com/lukeadministrator/luke-capability-engine
    branch: develop
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DB_SCHEMA
        value: capability_dev
      - key: POSTGRES_HOST
        fromDatabase:
          name: luke-nonprod-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: luke-nonprod-db
          property: port
      - key: POSTGRES_DATABASE
        fromDatabase:
          name: luke-nonprod-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: luke-nonprod-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: luke-nonprod-db
          property: password
      - key: LUKE_AUTH_GATEWAY_JWKS_URL
        value: https://platform-dev-auth.onrender.com/.well-known/jwks.json
      - key: ALLOWED_ORIGINS
        value: https://platform-dev-consumer-ui.onrender.com
      # Forms → Camunda intake (embed/webhook submit → process start).
      - fromGroup: platform-dev-internal
      - key: CORE_ENGINE_BASE_URL
        value: https://platform-dev-engine.onrender.com
      # Signs/verifies public embed tokens (set a real value; this generates one).
      - key: LUKE_EMBED_HMAC_SECRET
        generateValue: true

  # ── platform-dev-agents (LukeTalks AI agents) ───────────────────────────────
  # FastAPI app hosting the agent fleet under /agents/<slug>; the form agent is
  # also at root /chat (drop-in for the consumer-ui Form Builder's
  # VITE_FORM_AGENT_URL). Shares luke-nonprod-db in its OWN schema (luke_agents_dev)
  # to retain chat turns for fine-tuning, separate from the camunda/capability schemas.
  - type: web
    name: platform-dev-agents
    runtime: python
    repo: https://github.com/lukeadministrator/luke-agents
    branch: develop
    plan: starter
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pin Python to a version with prebuilt wheels (3.14 has no pydantic-core wheel).
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Groq key — set per service in the dashboard (sync:false keeps it out of git).
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.3-70b-versatile
      # Per-user cap: 200 actions / 3h to bound AI spend.
      - key: RATE_LIMIT_MAX
        value: "200"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "10800"
      # Transcript store -> shared db, this env's own schema. The app creates the
      # schema + tables on first connect (idempotent).
      - key: DATABASE_URL
        fromDatabase:
          name: luke-nonprod-db
          property: connectionString
      - key: AGENTS_DB_SCHEMA
        value: luke_agents_dev
      - key: TRANSCRIPTS_ENABLED
        value: "true"
      # Lock browser CORS to the consumer-ui Form Builder origin(s).
      - key: AGENTS_CORS
        value: https://platform-dev-consumer-ui.onrender.com,https://*.lukeflow.com

