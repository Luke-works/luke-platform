      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_BASE_URL
        value: https://platform-uat-engine.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
