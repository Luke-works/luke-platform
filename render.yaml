# ─────────────────────────────────────────────────────────────────────────────
# Luke platform — bundled non-prod blueprint
#
# One Render Blueprint that deploys luke-core-engine + luke-core-ui together for
# three shared non-prod environments: platform-dev, platform-qa, platform-uat.
#
# Topology
#   • One shared Postgres instance (luke-nonprod-db). Each environment is
#     isolated in its own schema via DB_SCHEMA (platform_dev/qa/uat) — the engine
#     sets currentSchema and creates the schema on first connect.
#   • Each env = an engine (Docker, from luke-core-engine) + a UI (static, from
#     luke-core-ui) + a consumer auth gateway (Docker, from luke-auth-engine).
#     All pulled from their own repos via `repo:`.
#   • Branch per env: develop → dev, qa → qa, uat → uat.
#
# Auth tier (luke-auth-engine, the *-auth services)
#   • Fronts luke-consumer-ui: verifies Clerk JWTs, then proxies to the env's
#     engine with a signed "act-as-user" token the engine trusts via JWKS.
#   • core-ui still talks to the engine directly over HTTP Basic (unchanged).
#   • Set each *-auth CLERK_* to that environment's Clerk instance.
#
# Prerequisites (one-time)
#   1. Connect THIS repo to Render as a Blueprint.
#   2. Grant Render access to lukeadministrator/luke-core-engine and
#      lukeadministrator/luke-core-ui (so the per-service `repo:` works).
#   3. Create the branches `develop`, `qa`, `uat` in BOTH code repos.
#
# Notes
#   • VITE_API_BASE_URL is baked into the UI at build time and must be the env's
#     engine URL. ALLOWED_ORIGINS on the engine must be the env's UI URL.
#     These use the deterministic https://<service-name>.onrender.com URLs; if
#     Render assigns a suffixed hostname, update both values accordingly.
#   • Camunda admin password is generated per env — retrieve from the Render
#     dashboard (Environment) after first deploy.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: luke-nonprod-db
    plan: basic-256mb
    databaseName: luke_camunda
    user: luke
    region: ohio
    postgresMajorVersion: "16"

services:
  # ── platform-dev ──────────────────────────────────────────────────────────
  - type: web
    name: platform-dev-engine
    runtime: docker
    repo: https://github.com/lukeadministrator/luke-core-engine
    branch: develop
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DB_SCHEMA
        value: platform_dev
      - key: POSTGRES_HOST
        fromDatabase:
          name: luke-nonprod-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: luke-nonprod-db
          property: port
      - key: POSTGRES_DATABASE
        fromDatabase:
          name: luke-nonprod-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: luke-nonprod-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: luke-nonprod-db
          property: password
      - key: CAMUNDA_ADMIN_USER
        value: admin
      - key: CAMUNDA_ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://platform-dev-ui.onrender.com
      # Trust the consumer auth gateway (luke-auth-engine) for Bearer tokens.
      - key: LUKE_AUTH_GATEWAY_ENABLED
        value: "true"
      - key: LUKE_AUTH_GATEWAY_JWKS_URL
        value: https://platform-dev-auth.onrender.com/.well-known/jwks.json
      # Reach the capability engine (Forms, etc.) via the CapabilitiesProxyController.
      - key: CAPABILITIES_BASE_URL
        value: https://platform-dev-capability.onrender.com

  # ── platform-dev-auth (consumer gateway) ────────────────────────────────────
  # Verifies Clerk JWTs from luke-consumer-ui and proxies to the engine with a
  # signed act-as-user token. Each env should ideally point CLERK_* at its own
  # Clerk instance; the dev instance is reused here until qa/uat get their own.
  - type: web
    name: platform-dev-auth
    runtime: docker
    repo: https://github.com/lukeadministrator/luke-auth-engine
    branch: develop
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: CORE_ENGINE_URL
        value: https://platform-dev-engine.onrender.com
      - key: CLERK_JWKS_URL
        value: https://gorgeous-seal-77.clerk.accounts.dev/.well-known/jwks.json
      - key: CLERK_ISSUER
        value: https://gorgeous-seal-77.clerk.accounts.dev
      - key: ALLOWED_ORIGINS
        value: https://platform-dev-consumer-ui.onrender.com
      # GATEWAY_PRIVATE_KEY left unset → ephemeral signing key per boot (non-prod).
      # The engine refetches the JWKS on the new kid after a restart.

  - type: web
    name: platform-dev-ui
    runtime: static
    repo: https://github.com/lukeadministrator/luke-core-ui
    branch: develop
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_BASE_URL
        value: https://platform-dev-engine.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ── platform-dev-consumer-ui (end-user app) ────────────────────────────────
  # Talks to the auth gateway (NOT the engine directly). VITE_CLERK_PUBLISHABLE_KEY
  # is public (frontend) and may be committed; point it at this env's Clerk.
  - type: web
    name: platform-dev-consumer-ui
    runtime: static
    repo: https://github.com/lukeadministrator/luke-consumer-ui
    branch: develop
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_CLERK_PUBLISHABLE_KEY
        value: pk_test_Z29yZ2VvdXMtc2VhbC03Ny5jbGVyay5hY2NvdW50cy5kZXYk
      - key: VITE_API_BASE_URL
        value: https://platform-dev-auth.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ── platform-dev-capability (capabilities + Forms) ──────────────────────────
  # Shares luke-nonprod-db in its OWN schema (capability_dev), separate from the
  # engine's camunda schema. Verifies the gateway act-as token via the auth JWKS.
  - type: web
    name: platform-dev-capability
    runtime: docker
    repo: https://github.com/lukeadministrator/luke-capability-engine
    branch: develop
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DB_SCHEMA
        value: capability_dev
      - key: POSTGRES_HOST
        fromDatabase:
          name: luke-nonprod-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: luke-nonprod-db
          property: port
      - key: POSTGRES_DATABASE
        fromDatabase:
          name: luke-nonprod-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: luke-nonprod-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: luke-nonprod-db
          property: password
      - key: LUKE_AUTH_GATEWAY_JWKS_URL
        value: https://platform-dev-auth.onrender.com/.well-known/jwks.json
      - key: ALLOWED_ORIGINS
        value: https://platform-dev-consumer-ui.onrender.com

  # ── platform-qa ───────────────────────────────────────────────────────────
