# ─────────────────────────────────────────────────────────────────────────────
# Luke platform — bundled non-prod blueprint
#
# One Render Blueprint that deploys luke-core-engine + luke-core-ui together for
# three shared non-prod environments: platform-dev, platform-qa, platform-uat.
#
# Topology
#   • One shared Postgres instance (luke-nonprod-db). Each environment is
#     isolated in its own schema via DB_SCHEMA (platform_dev/qa/uat) — the engine
#     sets currentSchema and creates the schema on first connect.
#   • Each env = an engine (Docker, from luke-core-engine) + a UI (static, from
#     luke-core-ui) + a consumer auth gateway (Docker, from luke-auth-engine).
#     All pulled from their own repos via `repo:`.
#   • Each env also runs an AI agents service (<env>-agents, Python, from
#     luke-agents): the LukeTalks form builder + agent fleet under /agents/<slug>
#     (form agent also at root /chat). It retains every chat turn in its OWN
#     schema (luke_agents_<env>) so the data can be exported to fine-tune the
#     model — separate from the engine/capability schemas.
#   • Branch per env: develop → dev, qa → qa, uat → uat.
#
# Auth tier (luke-auth-engine, the *-auth services)
#   • Fronts luke-consumer-ui: runs the WorkOS login flows (/auth/*) and verifies
#     the issued WorkOS access tokens, then proxies to the env's engine with a
#     signed "act-as-user" token the engine trusts via JWKS.
#   • core-ui still talks to the engine directly over HTTP Basic (unchanged).
#   • Set each *-auth WORKOS_CLIENT_ID + WORKOS_API_KEY in the dashboard (sync:false).
#
# Prerequisites (one-time)
#   1. Connect THIS repo to Render as a Blueprint.
#   2. Install the Render GitHub App on the **Luke-works** org and grant access to
#      every referenced repo (luke-core-engine, luke-core-ui, luke-auth-engine,
#      luke-capability-engine, luke-consumer-ui, luke-agents) so the per-service
#      `repo:` works. (Required after the 2026-06 move from the lukeadministrator
#      personal account into the Luke-works org.)
#   3. Create the branches `develop`, `qa`, `uat` in every referenced code repo
#      (including luke-agents).
#
# Notes
#   • VITE_API_BASE_URL is baked into the UI at build time and must be the env's
#     engine URL. ALLOWED_ORIGINS on the engine must be the env's UI URL.
#     These use the deterministic https://<service-name>.onrender.com URLs; if
#     Render assigns a suffixed hostname, update both values accordingly.
#   • Camunda admin password is generated per env — retrieve from the Render
#     dashboard (Environment) after first deploy.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: luke-nonprod-db
    plan: basic-1gb          # up from 256MB: the merged engine (Camunda + capability tables + full history) needs DB headroom
    databaseName: luke_camunda
    user: luke
    region: ohio
    postgresMajorVersion: "16"

# ── Shared internal secret (Forms → Camunda intake) ──────────────────────────
# The cap→core /api/internal/process-start call is authenticated with a shared
# secret. A group with generateValue makes ONE value per env that BOTH the engine
# and the capability service reference, so they always match. (Switch
# generateValue → sync:false if you'd rather set it manually.)
envVarGroups:
  - name: platform-dev-internal
    envVars:
      - key: LUKE_INTERNAL_SHARED_SECRET
        generateValue: true
  - name: platform-qa-internal
    envVars:
      - key: LUKE_INTERNAL_SHARED_SECRET
        generateValue: true

services:
  # ── platform-dev ──────────────────────────────────────────────────────────
  - type: web
    name: platform-dev-engine
    runtime: docker
    repo: https://github.com/Luke-works/luke-core-engine
    branch: develop
    plan: standard           # 2GB — merged engine (Camunda + GraalVM/Jython/Groovy + capability) OOMs on the 512MB starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DB_SCHEMA
        value: platform_dev
      - key: POSTGRES_HOST
        fromDatabase:
          name: luke-nonprod-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: luke-nonprod-db
          property: port
      - key: POSTGRES_DATABASE
        fromDatabase:
          name: luke-nonprod-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: luke-nonprod-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: luke-nonprod-db
          property: password
      - key: CAMUNDA_ADMIN_USER
        value: admin
      - key: CAMUNDA_ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://platform-dev-ui.onrender.com,https://*.lukeflow.com
      # Trust the consumer auth gateway (luke-auth-engine) for Bearer tokens.
      - key: LUKE_AUTH_GATEWAY_ENABLED
        value: "true"
      - key: LUKE_AUTH_GATEWAY_JWKS_URL
        value: https://platform-dev-auth.onrender.com/.well-known/jwks.json
      # Capability domain (forms/email/secrets/embed) is now IN-PROCESS — no proxy URL.
      # Shared secret still guards the retained /api/internal/** endpoints.
      - fromGroup: platform-dev-internal
      # ── Folded-in capability env (was the platform-dev-capability service) ──
      - key: POSTMARK_ACCOUNT_TOKEN
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: EMAIL_DEFAULT_FROM
        sync: false
      - key: EMAIL_SENDER_BASE_DOMAIN
        value: lukeflow.com
      # Secrets: use the built-in dev key in non-prod so the engine boots with NO
      # dashboard secret (SecretCrypto is fail-fast on a missing active key). Prod
      # sets LUKE_SECRETS_ACTIVE_KEY_ID=v1 + LUKE_SECRETS_KEYS_V1 (real key).
      - key: LUKE_EMBED_HMAC_SECRET
        generateValue: true
      # ── Signatures (merged from luke-signature-engine, SIG-M) ───────────────
      # PAdES sealing keystore (org PKCS#12 as base64) — set in the dashboard.
      # Without these the sign flow still completes but sealing fails (signed.pdf 409s).
      - key: LUKE_SIGN_KEYSTORE_BASE64
        sync: false
      - key: LUKE_SIGN_KEYSTORE_PASSWORD
        sync: false
      - key: LUKE_SIGN_KEY_ALIAS
        sync: false
      # Base URL for public /sign/:token links in engine-sent mail (SIG-9); set to the
      # consumer-ui public origin in the dashboard. UI-built links don't need it today.
      - key: SIGN_PUBLIC_BASE_URL
        sync: false
      # ── Document store: AWS S3 (DOC-7/DOC-10) ──────────────────────────────
      # Bucket: luke-docstore-dev (infra/s3/provision-docstore.sh --env dev). provider=s3
      # selects the engine's S3DocumentStore (DOC-7) so SIGNATURE PDFs land in S3 (no disk)
      # under {tenantId}/{key} — the SAME bucket+scheme the file-proxy reads, so a signed PDF
      # is also resolvable via GET /api/documents/{id}/content. The GENERAL document byte path
      # (upload/download) is the platform-dev-file-proxy service below, NOT this engine.
      # NOTE: the browser NEVER talks to S3 — bytes are proxied (no presigned URLs).
      - key: LUKE_DOCSTORE_PROVIDER
        value: s3
      - key: LUKE_DOCSTORE_BUCKET
        value: luke-docstore-dev
      - key: LUKE_DOCSTORE_REGION
        value: us-east-2
      - key: LUKE_DOCSTORE_ACCESS_KEY
        sync: false                # set in the dashboard from ~/luke-docstore-dev-key.json
      - key: LUKE_DOCSTORE_SECRET_KEY
        sync: false
      # "Save submission as Attachment": the engine calls the file-proxy's headless-Chromium render
      # endpoint to turn a completed submission into a PDF. Unset → the feature no-ops. Gated by the
      # shared LUKE_INTERNAL_SHARED_SECRET (already injected via the platform-dev-internal group).
      - key: LUKE_RENDER_URL
        value: https://platform-dev-file-proxy.onrender.com

  # ── platform-dev-auth (consumer gateway) ────────────────────────────────────
  # Runs the WorkOS login flows (/auth/*) for luke-consumer-ui, verifies the
  # issued WorkOS access tokens, and proxies to the engine with a signed
  # act-as-user token. WORKOS_CLIENT_ID/API_KEY are sync:false — set them per
  # service in the dashboard (same WorkOS project reused across envs for now).
  - type: web
    name: platform-dev-auth
    runtime: docker
    repo: https://github.com/Luke-works/luke-auth-engine
    branch: develop
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: CORE_ENGINE_URL
        value: https://platform-dev-engine.onrender.com
      # Capability routes are served by the engine now (merged) — point here.
      - key: CAPABILITIES_BASE_URL
        value: https://platform-dev-engine.onrender.com
      # DOCUMENTS byte tier: route /api/documents/** to the file-proxy (DOC-3/DOC-11). The
      # gateway injects the vouched X-User-Id on this hop. Unset → documents fall through to core.
      - key: FILE_PROXY_URL
        value: https://platform-dev-file-proxy.onrender.com
      - key: WORKOS_CLIENT_ID
        sync: false
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_REDIRECT_URI
        value: https://authdev.lukeflow.com/auth/callback
      - key: WORKOS_UI_CALLBACK_URL
        value: https://consdev.lukeflow.com/sso-callback
      - key: WORKOS_COOKIE_SECURE
        value: "true"
      # auth + UI share lukeflow.com (same-site) → Lax is enough; cross-site would need None.
      - key: WORKOS_COOKIE_SAMESITE
        value: Lax
      - key: ALLOWED_ORIGINS
        value: https://consdev.lukeflow.com,https://*.lukeflow.com
      # GATEWAY_PRIVATE_KEY left unset → ephemeral signing key per boot (non-prod).
      # The engine refetches the JWKS on the new kid after a restart.

  # ── platform-dev-file-proxy (DOCUMENTS byte tier) ───────────────────────────
  # The thin, stateless S3 byte-pipe (luke-file-proxy, CHARTER.md). The gateway routes
  # /api/documents/** here; it streams uploads→S3 and GET /content←S3, and calls the engine's
  # /api/internal/documents/** (guarded by the shared LUKE_INTERNAL_SHARED_SECRET) for authZ +
  # Document state — never bytes. Holds the dev S3 IAM key so document bytes stay OFF the heavy
  # core JVM. Spring Web + AWS SDK only → fits the starter plan (streaming = bounded heap).
  # PREREQUISITE: push luke-file-proxy to https://github.com/Luke-works/luke-file-proxy (branch
  # develop) before this service can deploy; set the two LUKE_DOCSTORE_* secrets in the dashboard
  # from ~/luke-docstore-dev-key.json (the SAME dev IAM key the engine uses).
  - type: web
    name: platform-dev-file-proxy
    runtime: docker
    repo: https://github.com/Luke-works/luke-file-proxy
    branch: develop
    plan: starter            # non-prod stays at 512MB by choice. NOTE: it now also runs headless
                             # Chromium for the submission-PDF renderer, which can exceed 512MB — on
                             # this plan renders may OOM/fail. That's best-effort (a failed render never
                             # fails the submission), so non-prod submission PDFs may be flaky here.
                             # PROD must use a larger plan (standard/2GB) for reliable rendering.
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: LUKE_CORE_BASE_URL
        value: https://platform-dev-engine.onrender.com
      # Same shared secret the engine uses to guard /api/internal/** (must MATCH the engine's).
      - fromGroup: platform-dev-internal
      - key: LUKE_DOCSTORE_PROVIDER
        value: s3
      - key: LUKE_DOCSTORE_BUCKET
        value: luke-docstore-dev
      - key: LUKE_DOCSTORE_REGION
        value: us-east-2
      - key: LUKE_DOCSTORE_ACCESS_KEY
        sync: false                # ~/luke-docstore-dev-key.json
      - key: LUKE_DOCSTORE_SECRET_KEY
        sync: false

  - type: web
    name: platform-dev-ui
    runtime: static
    repo: https://github.com/Luke-works/luke-core-ui
    branch: develop
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_BASE_URL
        value: https://platform-dev-engine.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ── platform-dev-consumer-ui (end-user app) ────────────────────────────────
  # Headless WorkOS: the SPA talks only to the auth gateway (/auth/*) — no auth
  # SDK, no provider keys in the browser. VITE_AUTH_API_URL is the gateway base.
  - type: web
    name: platform-dev-consumer-ui
    runtime: static
    repo: https://github.com/Luke-works/luke-consumer-ui
    branch: develop
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_AUTH_API_URL
        value: https://authdev.lukeflow.com
      # LukeTalks form-builder agent (root /chat alias on the agents service).
      - key: VITE_FORM_AGENT_URL
        value: https://platform-dev-agents.onrender.com
      # Forms autofill is suppressed on every input by default; "true" lets browsers/password
      # managers autofill normally. Explicit "false" keeps the suppression policy visible here.
      # NOTE: this controls the dashboard app only — the embedded-form bundle is vendored into
      # core-engine and built separately, so flipping it for /embed needs an embed rebuild.
      - key: VITE_FORMS_ALLOW_AUTOFILL
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Security headers — safe for the dashboard SPA (it is never framed and uses no
      # camera/mic/geo/payment). A full content Content-Security-Policy is deferred: roll
      # it out Report-Only first, once the per-env gateway + Sentry origins are pinned.
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()

  # platform-dev-capability REMOVED — luke-capability-engine merged into the engine.
  # forms/email/secrets/embed now run in platform-dev-engine (its env was folded in).

  # ── platform-dev-agents (LukeTalks AI agents) ───────────────────────────────
  # FastAPI app hosting the agent fleet under /agents/<slug>; the form agent is
  # also at root /chat (drop-in for the consumer-ui Form Builder's
  # VITE_FORM_AGENT_URL). Shares luke-nonprod-db in its OWN schema (luke_agents_dev)
  # to retain chat turns for fine-tuning, separate from the camunda/capability schemas.
  - type: web
    name: platform-dev-agents
    runtime: python
    repo: https://github.com/Luke-works/luke-agents
    branch: develop
    plan: starter
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Pin Python to a version with prebuilt wheels (3.14 has no pydantic-core wheel).
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Groq key — set per service in the dashboard (sync:false keeps it out of git).
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.3-70b-versatile
      # Per-user cap: 200 actions / 3h to bound AI spend.
      - key: RATE_LIMIT_MAX
        value: "200"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "10800"
      # Transcript store -> shared db, this env's own schema. The app creates the
      # schema + tables on first connect (idempotent).
      - key: DATABASE_URL
        fromDatabase:
          name: luke-nonprod-db
          property: connectionString
      - key: AGENTS_DB_SCHEMA
        value: luke_agents_dev
      - key: TRANSCRIPTS_ENABLED
        value: "true"
      # Lock browser CORS to the consumer-ui Form Builder origin(s).
      - key: AGENTS_CORS
        value: https://platform-dev-consumer-ui.onrender.com,https://*.lukeflow.com

  # ── platform-qa ───────────────────────────────────────────────────────────
  - type: web
    name: platform-qa-engine
    runtime: docker
    repo: https://github.com/Luke-works/luke-core-engine
    branch: qa
    plan: standard           # 2GB — merged engine OOMs on the 512MB starter (qa gets the merge when develop→qa lands)
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DB_SCHEMA
        value: platform_qa
      - key: POSTGRES_HOST
        fromDatabase:
          name: luke-nonprod-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: luke-nonprod-db
          property: port
      - key: POSTGRES_DATABASE
        fromDatabase:
          name: luke-nonprod-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: luke-nonprod-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: luke-nonprod-db
          property: password
      - key: CAMUNDA_ADMIN_USER
        value: admin
      - key: CAMUNDA_ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://platform-qa-ui.onrender.com,https://*.lukeflow.com
      # Trust the consumer auth gateway (luke-auth-engine) for Bearer tokens.
      - key: LUKE_AUTH_GATEWAY_ENABLED
        value: "true"
      - key: LUKE_AUTH_GATEWAY_JWKS_URL
        value: https://platform-qa-auth.onrender.com/.well-known/jwks.json
      # Capability domain (forms/email/secrets/embed) is now IN-PROCESS — no proxy URL.
      # Shared secret still guards the retained /api/internal/** endpoints.
      - fromGroup: platform-qa-internal
      # ── Folded-in capability env (was the platform-qa-capability service) ──
      - key: POSTMARK_ACCOUNT_TOKEN
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
      - key: EMAIL_DEFAULT_FROM
        sync: false
      - key: EMAIL_SENDER_BASE_DOMAIN
        value: lukeflow.com
      # Secrets: use the built-in dev key in non-prod so the engine boots with NO
      # dashboard secret (SecretCrypto is fail-fast on a missing active key). Prod
      # sets LUKE_SECRETS_ACTIVE_KEY_ID=v1 + LUKE_SECRETS_KEYS_V1 (real key).
      - key: LUKE_EMBED_HMAC_SECRET
        generateValue: true
      # ── Signatures (merged from luke-signature-engine, SIG-M) ───────────────
      # PAdES sealing keystore (org PKCS#12 as base64) — set in the dashboard.
      # Without these the sign flow still completes but sealing fails (signed.pdf 409s).
      - key: LUKE_SIGN_KEYSTORE_BASE64
        sync: false
      - key: LUKE_SIGN_KEYSTORE_PASSWORD
        sync: false
      - key: LUKE_SIGN_KEY_ALIAS
        sync: false
      # Base URL for public /sign/:token links in engine-sent mail (SIG-9); set to the
      # consumer-ui public origin in the dashboard. UI-built links don't need it today.
      - key: SIGN_PUBLIC_BASE_URL
        sync: false
      # ── Document store: AWS S3 (DOC-7/DOC-10) ──────────────────────────────
      # Bucket: luke-docstore-qa. provider=s3 → engine S3DocumentStore (signature PDFs in S3,
      # same bucket+scheme the file-proxy reads). General doc bytes go via platform-qa-file-proxy.
      - key: LUKE_DOCSTORE_PROVIDER
        value: s3
      - key: LUKE_DOCSTORE_BUCKET
        value: luke-docstore-qa
      - key: LUKE_DOCSTORE_REGION
        value: us-east-2
      - key: LUKE_DOCSTORE_ACCESS_KEY
        sync: false
      - key: LUKE_DOCSTORE_SECRET_KEY
        sync: false
      # "Save submission as Attachment" — engine → file-proxy headless-Chromium render endpoint.
      - key: LUKE_RENDER_URL
        value: https://platform-qa-file-proxy.onrender.com

  # ── platform-qa-auth (consumer gateway) ─────────────────────────────────────
  # Runs the WorkOS login flows; WORKOS_CLIENT_ID/API_KEY are sync:false (set in
  # the dashboard). Same WorkOS project reused across envs for now.
  - type: web
    name: platform-qa-auth
    runtime: docker
    repo: https://github.com/Luke-works/luke-auth-engine
    branch: qa
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: CORE_ENGINE_URL
        value: https://platform-qa-engine.onrender.com
      # Capability routes are served by the engine now (merged) — point here.
      - key: CAPABILITIES_BASE_URL
        value: https://platform-qa-engine.onrender.com
      # DOCUMENTS byte tier: route /api/documents/** to the qa file-proxy (gateway injects X-User-Id).
      - key: FILE_PROXY_URL
        value: https://platform-qa-file-proxy.onrender.com
      - key: WORKOS_CLIENT_ID
        sync: false
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_REDIRECT_URI
        value: https://authqa.lukeflow.com/auth/callback
      - key: WORKOS_UI_CALLBACK_URL
        value: https://consqa.lukeflow.com/sso-callback
      - key: WORKOS_COOKIE_SECURE
        value: "true"
      # auth + UI share lukeflow.com (same-site) → Lax is enough; cross-site would need None.
      - key: WORKOS_COOKIE_SAMESITE
        value: Lax
      - key: ALLOWED_ORIGINS
        value: https://consqa.lukeflow.com,https://*.lukeflow.com
      # GATEWAY_PRIVATE_KEY left unset → ephemeral signing key per boot (non-prod).

  # ── platform-qa-file-proxy (DOCUMENTS byte tier) ────────────────────────────
  # Thin S3 byte-pipe (luke-file-proxy). Mirrors platform-dev-file-proxy for qa; holds the qa
  # S3 IAM key. PREREQUISITE: luke-file-proxy pushed (branch qa) + the qa scoped IAM user created
  # (infra/s3 README) and its key set in the dashboard.
  - type: web
    name: platform-qa-file-proxy
    runtime: docker
    repo: https://github.com/Luke-works/luke-file-proxy
    branch: qa
    plan: starter            # non-prod stays at 512MB by choice; headless-Chromium renders may OOM here
                             # (best-effort, never fails the submission). PROD needs a larger plan.
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: LUKE_CORE_BASE_URL
        value: https://platform-qa-engine.onrender.com
      - fromGroup: platform-qa-internal
      - key: LUKE_DOCSTORE_PROVIDER
        value: s3
      - key: LUKE_DOCSTORE_BUCKET
        value: luke-docstore-qa
      - key: LUKE_DOCSTORE_REGION
        value: us-east-2
      - key: LUKE_DOCSTORE_ACCESS_KEY
        sync: false
      - key: LUKE_DOCSTORE_SECRET_KEY
        sync: false

  - type: web
    name: platform-qa-ui
    runtime: static
    repo: https://github.com/Luke-works/luke-core-ui
    branch: qa
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_BASE_URL
        value: https://platform-qa-engine.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ── platform-qa-consumer-ui (end-user app) ─────────────────────────────────
  - type: web
    name: platform-qa-consumer-ui
    runtime: static
    repo: https://github.com/Luke-works/luke-consumer-ui
    branch: qa
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_AUTH_API_URL
        value: https://authqa.lukeflow.com
      # LukeTalks form-builder agent (root /chat alias on the agents service).
      - key: VITE_FORM_AGENT_URL
        value: https://platform-qa-agents.onrender.com
      # Forms autofill is suppressed on every input by default; "true" lets browsers/password
      # managers autofill normally. Explicit "false" keeps the suppression policy visible here.
      # NOTE: this controls the dashboard app only — the embedded-form bundle is vendored into
      # core-engine and built separately, so flipping it for /embed needs an embed rebuild.
      - key: VITE_FORMS_ALLOW_AUTOFILL
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Security headers — safe for the dashboard SPA (it is never framed and uses no
      # camera/mic/geo/payment). A full content Content-Security-Policy is deferred: roll
      # it out Report-Only first, once the per-env gateway + Sentry origins are pinned.
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()

  # platform-qa-capability REMOVED — luke-capability-engine merged into the engine.
  # forms/email/secrets/embed now run in platform-qa-engine (its env was folded in).

  # ── platform-qa-agents (LukeTalks AI agents) ────────────────────────────────
  - type: web
    name: platform-qa-agents
    runtime: python
    repo: https://github.com/Luke-works/luke-agents
    branch: qa
    plan: starter
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.3-70b-versatile
      - key: RATE_LIMIT_MAX
        value: "200"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "10800"
      - key: DATABASE_URL
        fromDatabase:
          name: luke-nonprod-db
          property: connectionString
      - key: AGENTS_DB_SCHEMA
        value: luke_agents_qa
      - key: TRANSCRIPTS_ENABLED
        value: "true"
      - key: AGENTS_CORS
        value: https://platform-qa-consumer-ui.onrender.com,https://*.lukeflow.com

